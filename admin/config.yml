backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "posts"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        picker_utc: true
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        hint: "A short summary shown on the blog index page (1–2 sentences)."
      - label: "Body"
        name: "body"
        widget: "markdown"
